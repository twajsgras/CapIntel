<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>CapIntel</title>
  <meta name="description" content="Personal news + stock dashboard for AI, Fintech, and Energy." />

  <link rel="manifest" href="manifest.webmanifest" />
  <meta name="theme-color" content="#0b0d10" media="(prefers-color-scheme: dark)" />
  <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />

  <link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32.png" />
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="CapIntel" />

  <link rel="stylesheet" href="styles.css?v=8" />
</head>
<body>
  <header class="app-header">
    <div class="header-row">
      <h1 class="brand">Cap<span class="brand-accent">·</span>Intel</h1>
      <div class="header-actions">
        <button id="starredBtn" class="icon-btn" aria-label="Show starred" title="Starred">
          <svg viewBox="0 0 24 24" width="20" height="20" aria-hidden="true"><path fill="currentColor" d="M12 17.27 18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/></svg>
        </button>
        <button id="themeBtn" class="icon-btn" aria-label="Toggle theme" title="Theme">
          <svg viewBox="0 0 24 24" width="20" height="20" aria-hidden="true"><path fill="currentColor" d="M12 3a9 9 0 1 0 9 9 7 7 0 0 1-9-9z"/></svg>
        </button>
        <button id="settingsBtn" class="icon-btn" aria-label="Settings" title="Settings">
          <svg viewBox="0 0 24 24" width="20" height="20" aria-hidden="true"><path fill="currentColor" d="M19.14 12.94a7.93 7.93 0 0 0 .05-.94 7.93 7.93 0 0 0-.05-.94l2.03-1.58a.5.5 0 0 0 .12-.64l-1.92-3.32a.5.5 0 0 0-.61-.22l-2.39.96a7.84 7.84 0 0 0-1.62-.94l-.36-2.54a.5.5 0 0 0-.5-.42h-3.84a.5.5 0 0 0-.5.42l-.36 2.54a7.84 7.84 0 0 0-1.62.94l-2.39-.96a.5.5 0 0 0-.61.22L2.65 8.84a.5.5 0 0 0 .12.64l2.03 1.58a7.93 7.93 0 0 0 0 1.88l-2.03 1.58a.5.5 0 0 0-.12.64l1.92 3.32a.5.5 0 0 0 .61.22l2.39-.96c.5.39 1.05.71 1.62.94l.36 2.54a.5.5 0 0 0 .5.42h3.84a.5.5 0 0 0 .5-.42l.36-2.54c.57-.23 1.12-.55 1.62-.94l2.39.96a.5.5 0 0 0 .61-.22l1.92-3.32a.5.5 0 0 0-.12-.64ZM12 15.5A3.5 3.5 0 1 1 15.5 12 3.5 3.5 0 0 1 12 15.5Z"/></svg>
        </button>
      </div>
    </div>

    <div class="seg" role="tablist" id="seg">
      <button class="seg-btn active" data-view="news" role="tab">Feed</button>
      <button class="seg-btn" data-view="stocks" role="tab">Stocks</button>
    </div>

    <div class="chips" role="tablist" id="chips">
      <button class="chip active" data-topic="all" role="tab">All</button>
      <button class="chip chip-hot" data-topic="hot" role="tab" aria-label="Trending">🔥 Hot</button>
      <button class="chip" data-topic="ai" role="tab">AI</button>
      <button class="chip" data-topic="fintech" role="tab">Fintech</button>
      <button class="chip" data-topic="energy" role="tab">Energy</button>
      <button class="chip chip-starred" data-topic="starred" role="tab" aria-label="Starred only">★</button>
    </div>

    <div class="search-wrap">
      <input id="search" type="search" placeholder="Filter loaded articles…" autocomplete="off" spellcheck="false" />
      <button id="clearSearch" class="clear-search" aria-label="Clear">×</button>
    </div>
  </header>

  <main id="feed" class="feed" aria-live="polite"></main>

  <div id="pullHint" class="pull-hint" aria-hidden="true">↓ Release to refresh</div>

  <button id="refreshBtn" class="fab" aria-label="Refresh" title="Refresh (R)">
    <svg viewBox="0 0 24 24" width="22" height="22" aria-hidden="true"><path fill="currentColor" d="M17.65 6.35A8 8 0 1 0 19.73 14h-2.08a6 6 0 1 1-1.42-6.36L13 11h7V4z"/></svg>
  </button>

  <dialog id="settingsDialog" class="dialog">
    <form method="dialog" class="dialog-inner">
      <header class="dialog-header">
        <h2>Sources</h2>
        <button class="icon-btn" value="cancel" aria-label="Close">×</button>
      </header>
      <div id="sourceList" class="source-list"></div>
      <footer class="dialog-footer">
        <button type="button" id="resetSources" class="btn-secondary">Reset</button>
        <button value="ok" class="btn-primary">Done</button>
      </footer>
    </form>
  </dialog>

  <dialog id="stockDialog" class="dialog stock-dialog">
    <div class="dialog-inner stock-inner" id="stockInner"></div>
  </dialog>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <script>
    (function () {
      if (!('serviceWorker' in navigator)) return;
      if (sessionStorage.getItem('sw-reset-v8')) return;
      sessionStorage.setItem('sw-reset-v8', '1');
      (async () => {
        try {
          const regs = await navigator.serviceWorker.getRegistrations();
          await Promise.all(regs.map((r) => r.unregister()));
          if (window.caches) {
            const keys = await caches.keys();
            await Promise.all(keys.map((k) => caches.delete(k)));
          }
        } finally {
          location.reload();
        }
      })();
    })();
  </script>
  <script src="app-1.js?v=8" defer></script>
  <script src="app-2.js?v=8" defer></script>
  <script src="app-3.js?v=8" defer></script>
</body>
</html>
